name: CI

# Every example must pass its tests against LocalStack + Postgres, or the build
# fails. This is the "tested or rejected" gate from ROADMAP.md.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Least privilege: the default GITHUB_TOKEN only needs to read the repo.
permissions:
  contents: read

jobs:
  examples:
    name: example test suites
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: markets
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d markets"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 20

      localstack:
        image: localstack/localstack:4.14
        env:
          SERVICES: s3,dynamodb
          LS_LOG: warn
        ports:
          - 4566:4566
        options: >-
          --health-cmd "curl -sf http://localhost:4566/_localstack/health || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      DATABASE_URL: postgresql://app:app@localhost:5432/markets
      AWS_ENDPOINT_URL: http://localhost:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      S3_HOSTNAME: localhost

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "1.15.6"
          terraform_wrapper: false

      - name: Install example dependencies
        run: |
          python -m pip install --upgrade pip
          for req in examples/*/requirements.txt; do
            echo "installing $req"
            pip install -r "$req"
          done

      - name: Run every example test suite
        run: |
          set -e
          for d in examples/*/; do
            if [ -d "$d/tests" ]; then
              echo "::group::pytest $d"
              python -m pytest "$d/tests" -q
              echo "::endgroup::"
            fi
          done
          echo "ALL EXAMPLES PASSED"

  frontend:
    name: frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
      - run: npm install
      - run: npm run build

  kubernetes:
    name: kubernetes + grafana on minikube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Start minikube
        uses: medyagh/setup-minikube@e9e035a86bbc3caea26a450bd4dbf9d0c453682e # v0.0.21
        with:
          cpus: "2"
          memory: 4000m
      - name: Name the context 'oss' (the examples target it)
        run: kubectl config rename-context minikube oss
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r examples/kubernetes-minikube/requirements.txt \
                      -r examples/grafana-prometheus-minikube/requirements.txt
      - name: Kubernetes example
        run: python -m pytest examples/kubernetes-minikube/tests -q
      - name: Grafana + Prometheus example
        run: python -m pytest examples/grafana-prometheus-minikube/tests -q

  deploy:
    name: deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    # only auto-deploy a green main; never on PRs or red builds
    needs: [examples, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
      - name: Build site
        working-directory: frontend
        run: |
          npm install
          npm run build
      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: frontend
          command: pages deploy dist --project-name=opensource-assinnata --branch=main
